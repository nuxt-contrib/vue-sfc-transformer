catalogMode: prefer
shellEmulator: true
trustPolicy: no-downgrade
trustPolicyExclude:
  - '@octokit/action@6.1.0'
  - '@octokit/endpoint@9.0.6'
  - '@octokit/plugin-paginate-rest@9.2.2'
  - chokidar@4.0.3
  - undici@5.29.0 || 6.22.0
packages:
  - playground
overrides:
  '@vue/compiler-core': 3.5.38
  vue-sfc-transformer: 'link:.'
catalogs:
  dev:
    '@antfu/eslint-config': 9.0.0
    '@babel/types': 7.29.7
    '@types/node': 24.13.2
    '@vitest/coverage-v8': 4.1.8
    '@volar/typescript': 2.4.28
    '@vue/compiler-dom': 3.5.38
    '@vue/compiler-sfc': 3.5.38
    '@vue/language-core': 3.3.5
    eslint: 10.5.0
    exsolve: 1.0.8
    installed-check: 10.0.1
    knip: 6.16.1
    lint-staged: 17.0.7
    mkdist: 2.4.1
    pkg-pr-new: 0.0.75
    rolldown: 1.1.1
    simple-git-hooks: 2.13.1
    tsdown: 0.22.2
    typescript: 6.0.3
    vitest: 4.1.8
    vue-tsc: 3.3.5
  peer:
    '@vue/compiler-core': 3.5.38
    esbuild: 0.28.1
    vue: 3.5.38
  prod:
    '@babel/parser': ^7.27.0
    pathe: ^2.0.3
    tinyglobby: ^0.2.16

allowBuilds:
  '@parcel/watcher': false
  esbuild: false
  simple-git-hooks: true
