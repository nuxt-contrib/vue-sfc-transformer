catalogMode: prefer
shellEmulator: true
trustPolicy: no-downgrade
trustPolicyExclude:
  - '@octokit/action@6.1.0'
  - '@octokit/endpoint@9.0.6'
  - '@octokit/plugin-paginate-rest@9.2.2'
  - chokidar@4.0.3
  - undici@5.29.0 || 6.22.0
packages:
  - playground
overrides:
  '@vue/compiler-core': 3.5.34
  vue-sfc-transformer: 'link:.'
catalogs:
  dev:
    '@antfu/eslint-config': 9.0.0
    '@babel/types': 7.29.0
    '@types/node': 24.12.3
    '@vitest/coverage-v8': 4.1.6
    '@vue/compiler-dom': 3.5.34
    '@vue/compiler-sfc': 3.5.34
    bumpp: 11.1.0
    changelogithub: 14.0.0
    eslint: 10.3.0
    exsolve: 1.0.8
    installed-check: 10.0.1
    knip: 6.12.2
    lint-staged: 17.0.4
    mkdist: 2.4.1
    pkg-pr-new: 0.0.71
    simple-git-hooks: 2.13.1
    typescript: 6.0.3
    unbuild: 3.6.1
    vitest: 4.1.6
    vue-tsc: 3.2.8
  peer:
    '@vue/compiler-core': 3.5.34
    esbuild: 0.28.0
    vue: 3.5.34
  prod:
    '@babel/parser': ^7.27.0

allowBuilds:
  '@parcel/watcher': false
  esbuild: false
  simple-git-hooks: true
