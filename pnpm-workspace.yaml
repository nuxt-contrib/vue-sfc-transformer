catalogMode: prefer
shellEmulator: true
trustPolicy: no-downgrade
trustPolicyExclude:
  - '@octokit/action@6.1.0'
  - '@octokit/endpoint@9.0.6'
  - '@octokit/plugin-paginate-rest@9.2.2'
  - chokidar@4.0.3
  - undici@5.29.0 || 6.22.0
packages:
  - playground
overrides:
  '@vue/compiler-core': 3.5.39
  vue-sfc-transformer: 'link:.'
catalogs:
  dev:
    '@antfu/eslint-config': 9.1.0
    '@babel/types': 8.0.4
    '@types/node': 24.13.2
    '@vitest/coverage-v8': 4.1.10
    '@volar/typescript': 2.4.28
    '@vue/compiler-dom': 3.5.39
    '@vue/compiler-sfc': 3.5.39
    '@vue/language-core': 3.3.6
    eslint: 10.7.0
    exsolve: 1.1.0
    installed-check: 10.0.1
    knip: 6.27.0
    lint-staged: 17.0.8
    mkdist: 2.4.1
    pkg-pr-new: 0.0.75
    rolldown: 1.1.4
    simple-git-hooks: 2.13.1
    tsdown: 0.22.3
    typescript: 6.0.3
    vitest: 4.1.10
    vue-tsc: 3.3.6
  peer:
    '@vue/compiler-core': 3.5.39
    esbuild: 0.28.1
    vue: 3.5.39
  prod:
    '@babel/parser': ^8.0.0
    pathe: ^2.0.3
    tinyglobby: ^0.2.16

allowBuilds:
  '@parcel/watcher': false
  esbuild: false
  simple-git-hooks: true
