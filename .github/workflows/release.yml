name: release

on:
  push:
    tags:
      - 'v*'
  pull_request_target:
    types: [closed]
    branches:
      - main
  workflow_dispatch:

permissions: {}

jobs:
  release:
    uses: nuxt/.github/.github/workflows/release.yml@main
    permissions:
      contents: write
      actions: write
      id-token: write
    with:
      # pnpm pack runs the `prepack` hook (= `pnpm build` via unbuild), but
      # build needs devDependencies installed first.
      pack-command: |
        pnpm install --frozen-lockfile
        pnpm pack --pack-destination .
